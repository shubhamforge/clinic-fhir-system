<mat-sidenav-container class="app-container">

  <mat-sidenav mode="side" opened class="app-sidenav" role="navigation" aria-label="Main navigation">
    <div class="app-sidenav__brand">
      <mat-icon class="app-sidenav__logo-icon">local_hospital</mat-icon>
      <span class="app-sidenav__logo-text">Care Platform</span>
    </div>

    <mat-nav-list class="app-sidenav__nav">
      <a
        mat-list-item
        routerLink="/patients"
        routerLinkActive="nav-item--active"
        ariaCurrentWhenActive="page"
      >
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Patients</span>
      </a>
      <a
        mat-list-item
        routerLink="/encounters"
        routerLinkActive="nav-item--active"
        ariaCurrentWhenActive="page"
      >
        <mat-icon matListItemIcon>event_note</mat-icon>
        <span matListItemTitle>Encounters</span>
      </a>
      <a
        mat-list-item
        routerLink="/vitals"
        routerLinkActive="nav-item--active"
        ariaCurrentWhenActive="page"
      >
        <mat-icon matListItemIcon>monitor_heart</mat-icon>
        <span matListItemTitle>Vitals</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="app-toolbar" color="primary">
      <span class="mat-body-strong">Clinician Dashboard</span>
    </mat-toolbar>

    <main id="main-content" class="app-main" tabindex="-1">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
