<div class="dashboard">
  <div class="dashboard__header">
    @if (isPatientLoading()) {
      <cp-patient-header-skeleton />
    } @else if (isPatientError()) {
      <cp-panel-error
        message="Could not load patient data"
        (retry)="reload()"
      />
    } @else {
      <cp-patient-header [data]="patientHeader()!" />
    }
  </div>

  <div class="dashboard__panels" #panelsGrid>
    <aside class="dashboard__panel dashboard__panel--left">
      @if (isPatientLoading()) {
        <cp-snapshot-skeleton />
      } @else if (isPatientError()) {
        <cp-panel-error message="Snapshot unavailable" (retry)="reload()" />
      } @else {
        <cp-snapshot-panel [snapshot]="snapshotData()!" />
      }
    </aside>

    <main class="dashboard__panel dashboard__panel--center">
      @if (isTimelineLoading()) {
        <cp-timeline-skeleton />
      } @else if (isTimelineError()) {
        <cp-panel-error message="Timeline unavailable" (retry)="reload()" />
      } @else {
        <cp-timeline-panel
          [events]="timelineData()"
          [trends]="trendsData()"
          (loadMore)="onLoadMore()"
        />
      }
    </main>

    <div
      class="dashboard__resizer"
      [class.dragging]="isDragging()"
      (mousedown)="onResizerMousedown($event)"
    ></div>

    <aside class="dashboard__panel dashboard__panel--right">
      @if (isPatientLoading()) {
        <cp-care-skeleton />
      } @else if (isPatientError()) {
        <cp-panel-error message="Care plan unavailable" (retry)="reload()" />
      } @else {
        <cp-care-panel
          [patientId]="patientId()"
          [carePlan]="carePlan()"
          [pending]="pendingOrders()"
        />
      }
    </aside>
  </div>
</div>
